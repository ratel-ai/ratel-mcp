name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: Dry run (validate but do not publish)
        type: boolean
        default: false
      ref:
        description: Git ref to build (only used with workflow_dispatch)
        required: false
        default: main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tag-version-check:
    name: Tag/version sync
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
      dist_tag: ${{ steps.compute.outputs.dist_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
      - id: compute
        shell: bash
        run: |
          set -e
          if [ "${{ github.event_name }}" = "push" ]; then
            tag_version="${GITHUB_REF_NAME#v}"
          else
            tag_version=$(node -p "require('./apps/ratel-mcp/package.json').version")
          fi

          pkg_version=$(node -p "require('./apps/ratel-mcp/package.json').version")

          echo "tag_version=$tag_version"
          echo "package=$pkg_version"

          if [ "$pkg_version" != "$tag_version" ]; then
            echo "::error::Version mismatch — package.json says $pkg_version, tag/ref says $tag_version"
            exit 1
          fi

          if [[ "$tag_version" == *-rc.* ]]; then
            echo "dist_tag=rc" >> "$GITHUB_OUTPUT"
          else
            echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$tag_version" >> "$GITHUB_OUTPUT"
      - name: Verify CHANGELOG updated
        shell: bash
        env:
          VERSION: ${{ steps.compute.outputs.version }}
        run: |
          set -e
          if ! grep -qF "## [${VERSION}]" CHANGELOG.md; then
            echo "::error file=CHANGELOG.md::missing entry for version ${VERSION}"
            exit 1
          fi

  publish-npm:
    name: Publish to npm
    needs: tag-version-check
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - name: Verify npm CLI version
        shell: bash
        run: |
          set -e
          npm --version
          # Trusted Publishers requires npm CLI 11.5.1+
          node -e "const v = require('child_process').execSync('npm --version').toString().trim(); const [maj, min, patch] = v.split('.').map(Number); if (maj < 11 || (maj === 11 && (min < 5 || (min === 5 && patch < 1)))) { console.error('npm CLI ' + v + ' < 11.5.1 (required for Trusted Publishers)'); process.exit(1); } console.log('npm ' + v + ' OK');"
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Publish
        shell: bash
        env:
          DRY_RUN: ${{ inputs.dry_run && '--dry-run' || '' }}
          DIST_TAG: ${{ needs.tag-version-check.outputs.dist_tag }}
        run: |
          set -e
          pnpm --filter @ratel-ai/mcp-server pack --pack-destination "${RUNNER_TEMP}/pack"
          npm publish "${RUNNER_TEMP}/pack"/*.tgz --provenance --access public --tag "$DIST_TAG" $DRY_RUN

  github-release:
    name: GitHub Release
    needs: [tag-version-check, publish-npm]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.tag-version-check.outputs.version }}
          DIST_TAG: ${{ needs.tag-version-check.outputs.dist_tag }}
        run: |
          set -e
          flags=""
          if [ "$DIST_TAG" = "rc" ]; then flags="--prerelease"; fi
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --generate-notes \
            $flags
